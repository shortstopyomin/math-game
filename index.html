<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G8苦茶店：數學大挑戰</title>
    <style>
        body {
            font-family: "Microsoft JhengHei", "Heiti TC", sans-serif;
            background-color: #fff9e6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            flex-wrap: wrap;
            gap: 20px;
        }

        .game-container {
            background: white;
            padding: 20px 30px;
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            max-width: 600px;
            width: 95%;
            text-align: center;
            border: 5px solid #ffcc00;
            max-height: 90vh;
            overflow-y: auto;
        }

        .screen {
            display: none;
        }

        .active {
            display: block;
        }

        h1 {
            color: #8b4513;
            margin-top: 0;
        }

        .cover-icon {
            font-size: 80px;
            margin-bottom: 20px;
        }

        /* 題目區域 */
        .question-text {
            font-size: 20px;
            margin-bottom: 10px;
            color: #5d4037;
            line-height: 1.4;
        }

        .visual-area {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 10px;
            min-height: 100px;
            margin: 10px 0;
            padding: 15px;
            background: #fffdf0;
            border-radius: 20px;
        }

        .tea-cup {
            font-size: 50px;
            position: relative;
            display: inline-block;
        }

        .tea-cup.drunk::after {
            content: "❌";
            position: absolute;
            top: 0;
            left: 0;
            font-size: 45px;
            opacity: 0.8;
        }

        /* 輸入與按鈕 */
        input[type="number"] {
            font-size: 28px;
            width: 80px;
            padding: 10px;
            border: 3px solid #ffcc00;
            border-radius: 10px;
            text-align: center;
            outline: none;
        }

        .btn {
            font-size: 20px;
            padding: 12px 35px;
            background-color: #ffcc00;
            color: #5d4037;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
            margin: 10px;
        }

        .btn:hover {
            background-color: #ffbb00;
            transform: scale(1.05);
        }

        #message {
            margin-top: 20px;
            font-size: 22px;
            font-weight: bold;
            min-height: 30px;
        }

        /* 成功畫面特效 */
        .success-icon {
            font-size: 100px;
            margin-bottom: 20px;
            animation: bounce 1s infinite;
        }

        @keyframes bounce {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-20px);
            }
        }

        /* 虛擬鍵盤 */
        .keyboard-container {
            display: none;
            background: white;
            padding: 20px;
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            border: 5px solid #4caf50;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            width: 250px;
        }

        .keyboard-container.active {
            display: grid;
        }

        .key-btn {
            font-size: 28px;
            padding: 15px 0;
            background-color: #f1f8e9;
            color: #33691e;
            border: 3px solid #aed581;
            border-radius: 15px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.1s;
            text-align: center;
            user-select: none;
        }

        .key-btn:hover {
            background-color: #dcedc8;
        }

        .key-btn:active {
            background-color: #aed581;
            transform: scale(0.95);
        }

        .key-zero {
            grid-column: span 2;
        }
    </style>
</head>

<body>

    <div class="game-container">

        <div id="start-screen" class="screen active">
            <div class="cover-icon">🍵✨</div>
            <h1>G8苦茶店</h1>
            <p style="font-size: 18px; color: #d2691e;">幫店長算算剩下的苦茶吧！</p>
            <div style="margin-top:20px;">
                <button class="btn" onclick="startGame(1)">小學一二年級</button>
                <button class="btn" style="background-color: #4caf50; color: white;"
                    onclick="startGame(3)">小學三四年級</button>
            </div>
        </div>

        <div id="game-screen" class="screen">
            <div id="grade-hint"
                style="display: inline-block; padding: 5px 15px; border-radius: 20px; font-weight: bold; margin-bottom: 10px; color: #5d4037; font-size: 18px; background-color: #ffe0b2;">
            </div>
            <div class="question-text" id="question"></div>
            <div class="visual-area" id="visual-area"></div>
            <div class="input-area">
                <span id="prefix-text">剩下</span> <input type="number" id="answer-input" placeholder="?"
                    onkeyup="if(event.keyCode==13) checkAnswer()">
                杯
                <button class="btn" onclick="checkAnswer()">送出答案</button>
            </div>
            <div id="message"></div>
        </div>

        <div id="success-screen" class="screen">
            <div class="success-icon">🏆</div>
            <h1 style="color: #4caf50;">闖關成功！</h1>
            <p style="font-size: 20px;">你真是數學小高手！</p>
            <button class="btn" onclick="resetToHome()">再玩一次</button>
        </div>

    </div>

    <div class="keyboard-container" id="virtual-keyboard">
        <button class="key-btn" onclick="typeKey(1)">1</button>
        <button class="key-btn" onclick="typeKey(2)">2</button>
        <button class="key-btn" onclick="typeKey(3)">3</button>
        <button class="key-btn" onclick="typeKey(4)">4</button>
        <button class="key-btn" onclick="typeKey(5)">5</button>
        <button class="key-btn" onclick="typeKey(6)">6</button>
        <button class="key-btn" onclick="typeKey(7)">7</button>
        <button class="key-btn" onclick="typeKey(8)">8</button>
        <button class="key-btn" onclick="typeKey(9)">9</button>
        <button class="key-btn key-zero" onclick="typeKey(0)">0</button>
        <button class="key-btn" onclick="typeKey('del')">⌫</button>
    </div>

    <script>
        let remainingCups = 0;
        let currentGrade = 1;

        function startGame(grade) {
            currentGrade = grade;
            showScreen('game-screen');
            generateQuestion();
        }

        function resetToHome() {
            showScreen('start-screen');
        }

        function showScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');

            const keyboard = document.getElementById('virtual-keyboard');
            if (screenId === 'game-screen') {
                keyboard.classList.add('active');
            } else {
                keyboard.classList.remove('active');
            }
        }

        function typeKey(key) {
            const input = document.getElementById('answer-input');
            if (key === 'del') {
                input.value = input.value.slice(0, -1);
            } else {
                input.value += key;
            }
            input.focus();
        }

        function generateQuestion() {
            // 清空狀態
            document.getElementById('answer-input').value = '';
            document.getElementById('message').innerText = '';
            const area = document.getElementById('visual-area');
            area.innerHTML = '';
            // 重置預設樣式
            area.style.gap = '';
            area.style.padding = '';

            const gradeHint = document.getElementById('grade-hint');
            const prefixText = document.getElementById('prefix-text');

            if (currentGrade === 1) {
                gradeHint.innerText = '✏️ 小學一二年級挑戰';
                gradeHint.style.backgroundColor = '#ffe0b2';
                prefixText.innerText = '剩下 ';

                // 一二年級：減法題型
                const total = Math.floor(Math.random() * 10) + 5; // 5~14杯
                const drunk = Math.floor(Math.random() * (total - 1)) + 1;
                remainingCups = total - drunk;

                document.getElementById('question').innerText = `店長做了 ${total} 杯苦茶，同學喝掉 ${drunk} 杯，還剩下幾杯？`;

                for (let i = 0; i < total; i++) {
                    const cup = document.createElement('span');
                    cup.className = 'tea-cup' + (i < drunk ? ' drunk' : '');
                    cup.innerText = '🍵';
                    cup.style.fontSize = "40px"; // 縮小預設杯子
                    area.appendChild(cup);
                }
            } else {
                gradeHint.innerText = '✏️ 小學三四年級挑戰';
                gradeHint.style.backgroundColor = '#c8e6c9';
                prefixText.innerText = '共有 ';

                // 讓三四年級畫面更緊湊
                area.style.gap = '5px';
                area.style.padding = '5px';

                // 三四年級：乘法題型
                const boxes = Math.floor(Math.random() * 4) + 2; // 2~5 盒
                const cupsPerBox = Math.floor(Math.random() * 5) + 2; // 2~6 杯
                remainingCups = boxes * cupsPerBox;

                document.getElementById('question').innerText = `店長裝了 ${boxes} 盒苦茶，每一盒裡面有 ${cupsPerBox} 杯，總共有幾杯苦茶？`;

                for (let i = 0; i < boxes; i++) {
                    const boxDiv = document.createElement('div');
                    boxDiv.style.border = "2px dashed #8b4513";
                    boxDiv.style.padding = "5px 10px";
                    boxDiv.style.borderRadius = "15px";
                    boxDiv.style.margin = "3px";
                    boxDiv.style.backgroundColor = "rgba(139, 69, 19, 0.05)";

                    for (let j = 0; j < cupsPerBox; j++) {
                        const cup = document.createElement('span');
                        cup.className = 'tea-cup';
                        cup.innerText = '🍵';
                        cup.style.fontSize = "26px"; // 緊湊縮小杯子
                        cup.style.lineHeight = "1.2";
                        boxDiv.appendChild(cup);
                    }
                    area.appendChild(boxDiv);
                }
            }
            document.getElementById('answer-input').focus();
        }

        function checkAnswer() {
            const val = parseInt(document.getElementById('answer-input').value);
            const msg = document.getElementById('message');

            if (isNaN(val)) return;

            if (val === remainingCups) {
                // 成功：跳轉到成功畫面
                showScreen('success-screen');
            } else {
                // 失敗：秀出錯誤提示，並維持在原題目讓使用者繼續嘗試
                msg.innerText = "❌ 答案錯誤，再數數看喔！";
                msg.style.color = "#f44336";
                document.getElementById('answer-input').value = '';
                document.getElementById('answer-input').focus();
            }
        }
    </script>
</body>

</html>
